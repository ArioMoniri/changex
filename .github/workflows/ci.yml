name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: tests + LibreOffice oracle (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LibreOffice (Writer) — drives the real accept/reject oracle
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer

      - name: Install ChangeX (core[preview] + mcp[http] + api) and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/core[preview]" -e "packages/mcp[http]" -e packages/api pytest httpx

      - name: Test suite (portable — runs everywhere)
        run: pytest -q

      - name: LibreOffice external-engine oracle (real Accept-All / Reject-All)
        run: pytest -q -m libreoffice

  viewer:
    name: viewer build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/viewer/package-lock.json
      - name: Build the viewer frontend
        working-directory: packages/viewer
        run: |
          npm ci
          npm run build

  windows-preview:
    name: Windows preview engine + handler build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the engine + test the preview on Windows
        run: |
          python -m pip install --upgrade pip
          pip install "./packages/core[preview]" pytest
          pytest -q tests/test_preview.py
      - name: changex preview smoke (real Windows)
        shell: pwsh
        run: |
          Set-Content -Path sample.py -Value "import math`r`nprint(math.pi)"
          $html = (changex preview sample.py | Out-String)
          if ($html -notmatch 'class="highlight"') { throw "code preview not highlighted on Windows" }
          Write-Host "OK: changex preview works on Windows"
      - name: Build the Explorer preview handler (.NET Framework 4.8)
        run: dotnet build packages/winpreview/ChangeXPreview/ChangeXPreview.csproj -c Release
