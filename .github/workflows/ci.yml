name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: tests + LibreOffice oracle (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LibreOffice (Writer) — drives the real accept/reject oracle
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer

      - name: Install ChangeX (core + mcp[http] + api) and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/core -e "packages/mcp[http]" -e packages/api pytest httpx

      - name: Test suite (portable — runs everywhere)
        run: pytest -q

      - name: LibreOffice external-engine oracle (real Accept-All / Reject-All)
        run: pytest -q -m libreoffice

  viewer:
    name: viewer build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/viewer/package-lock.json
      - name: Build the viewer frontend
        working-directory: packages/viewer
        run: |
          npm ci
          npm run build
