## OPTIONAL desktop bundle. The primary review UI is `changex view` (zero-install
## local webserver) + the single-file HTML report — the Tauri app is just a
## double-clickable shell over the same renderer. This workflow is gated to manual
## dispatch / version tags so it never runs on ordinary pushes.
##
## Code signing / notarization is applied ONLY if the corresponding secrets exist;
## with no secrets it produces an UNSIGNED bundle (fine for local/dev use, but macOS
## Gatekeeper will warn). See docs/CI-AND-SECRETS.md for the exact secrets.
##
## Caveat: the app currently shells out to a `changex` CLI on PATH; it does not yet
## bundle the Python core as a sidecar, so a released bundle still needs ChangeX
## installed. Treat this as a build/signing scaffold, not a finished installer.

name: Desktop bundle (Tauri, optional)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # attach artifacts to the tagged release

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Linux webview + image deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libssl-dev libgtk-3-dev imagemagick

      - name: macOS image deps (ImageMagick — recent macOS runners don't ship it)
        if: runner.os == 'macOS'
        run: brew install imagemagick

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: packages/viewer
        run: npm ci

      - name: Generate app icons (from the committed ChangeX logo)
        working-directory: packages/viewer
        shell: bash
        # icons/_source.png is the real ChangeX mark (document + red/green redline). Regenerate
        # the platform icon set from it so a fresh checkout always has matching icons.
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/icons/_source.png

      - name: Build (and sign/notarize if secrets are present)
        uses: tauri-apps/tauri-action@v0
        env:
          # Required for tauri-action to upload the built bundles to the GitHub release
          # (a tag/release run sets tagName; without this the upload fails: "GITHUB_TOKEN is required").
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- updater signing (signs the update artifacts + generates latest.json) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- macOS signing + notarization (used only if APPLE_CERTIFICATE is set) ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/viewer
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('ChangeX Viewer {0}', github.ref_name) || '' }}
          releaseDraft: true

  # Re-upload version-less installer copies so the README's
  # /releases/latest/download/<stable-name> buttons always fetch the newest build.
  aliases:
    needs: bundle
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish stable download aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          cd "$(mktemp -d)"
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" \
            -p '*aarch64.dmg' -p '*x64_en-US.msi' -p '*amd64.AppImage'
          cp *aarch64.dmg    ChangeX-Viewer-macos.dmg
          cp *x64_en-US.msi  ChangeX-Viewer-windows.msi
          cp *amd64.AppImage ChangeX-Viewer-linux.AppImage
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" \
            ChangeX-Viewer-macos.dmg ChangeX-Viewer-windows.msi ChangeX-Viewer-linux.AppImage --clobber
