## Builds the ChangeX Quick Look helper app (host app + .changex preview extension) and
## attaches a .dmg to the release. Signs (Developer ID) + notarizes when the Apple secrets
## are present (same secrets as the Tauri desktop bundle); otherwise an UNSIGNED .dmg.
##
## Trigger: a v* tag (attaches to the release) or manual dispatch (build-only).

name: Quick Look app (macOS)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  quicklook:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Render check (headless — guards the blank-preview & syntax-highlight regression)
        working-directory: packages/quicklook
        run: |
          set -euo pipefail
          swiftc -O Extension/ChangexRenderer.swift Tests/RenderCheck.swift -o "$RUNNER_TEMP/rendercheck"
          "$RUNNER_TEMP/rendercheck"

      - name: Build (unsigned) then codesign Developer ID (if cert present)
        working-directory: packages/quicklook
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          xcodegen generate
          # xcodebuild's project-level signing of an app-extension is fragile, so build
          # UNSIGNED and codesign manually (inside-out) — the reliable distribution path.
          xcodebuild -project ChangeXQuickLook.xcodeproj -scheme ChangeXQuickLook \
            -configuration Release SYMROOT=build CODE_SIGNING_ALLOWED=NO build
          APP="build/Release/ChangeXQuickLook.app"
          if [ -n "${APPLE_CERTIFICATE:-}" ]; then
            KC="$RUNNER_TEMP/cx.keychain-db"; KP="$(uuidgen)"
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security create-keychain -p "$KP" "$KC"
            security default-keychain -s "$KC"
            security unlock-keychain -p "$KP" "$KC"
            security set-keychain-settings -lut 21600 "$KC"
            security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KC" >/dev/null
            security list-keychains -d user -s "$KC" login.keychain-db
            ID="$APPLE_SIGNING_IDENTITY"
            # The extension MUST keep its App Sandbox entitlement (pkd rejects
            # unsandboxed Quick Look plug-ins), so sign it WITH the entitlements.
            codesign --force --options runtime --timestamp --keychain "$KC" --sign "$ID" \
              --entitlements Extension/QuickLookExtension.entitlements \
              "$APP/Contents/PlugIns/QuickLookExtension.appex"
            codesign --force --options runtime --timestamp --keychain "$KC" --sign "$ID" "$APP"
            codesign --verify --deep --strict --verbose=2 "$APP"
          fi

      - name: Package .dmg (+ notarize & staple if APPLE_ID present)
        working-directory: packages/quicklook
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          hdiutil create -volname "ChangeX Quick Look" \
            -srcfolder build/Release/ChangeXQuickLook.app -ov -format UDZO ChangeX-QuickLook.dmg
          if [ -n "${APPLE_ID:-}" ]; then
            xcrun notarytool submit ChangeX-QuickLook.dmg \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple ChangeX-QuickLook.dmg || true
          fi

      - name: Attach to the release (tag runs only)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" -R "$GITHUB_REPOSITORY" packages/quicklook/ChangeX-QuickLook.dmg --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: ChangeX-QuickLook-dmg
          path: packages/quicklook/ChangeX-QuickLook.dmg
