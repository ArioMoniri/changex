[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "changex-mcp"
version = "0.1.8"
description = "ChangeX MCP server: edit a .docx through an MCP client and get native Word revisions plus a portable .changex provenance journal."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Ariorad Moniri" }]
keywords = ["mcp", "docx", "track-changes", "provenance", "fastmcp"]
classifiers = [
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: Office/Business :: Office Suites",
]
dependencies = [
    # The official Python MCP SDK (ships FastMCP under mcp.server.fastmcp). The
    # remote Streamable HTTP / SSE transport needs the SDK's ASGI app helpers,
    # so pull the SDK's own HTTP extras (starlette/uvicorn) in with it.
    "mcp[cli]>=1.8.0",
    # The ChangeX spine: model, journal, docx adapter, render. Pinned for the
    # standalone `uvx changex-mcp` path; resolved from the workspace for dev.
    "changex-core>=0.1.8",
]

[project.optional-dependencies]
# Remote HTTP transport (`changex-mcp --http`). The ASGI server + framework the
# MCP Streamable-HTTP / SSE app runs on. Listed explicitly so an install that
# does not pull the SDK's `cli` extra still gets a working `--http` server.
http = [
    "starlette>=0.37",
    "uvicorn>=0.30",
]
dev = [
    "pytest>=7.0",
    "ruff>=0.1",
    "mypy>=1.5",
    "httpx>=0.27",      # MCP Streamable-HTTP client used by the HTTP transport test
    "starlette>=0.37",
    "uvicorn>=0.30",
]

[project.scripts]
# `uvx changex-mcp` and `python -m changex_mcp` both land on the same stdio server.
changex-mcp = "changex_mcp.server:main"

# Resolve changex-core from the local workspace during development.
[tool.uv.sources]
changex-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/changex_mcp"]

[tool.hatch.build.targets.sdist]
include = ["src/changex_mcp", "README.md"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
ignore_missing_imports = true
