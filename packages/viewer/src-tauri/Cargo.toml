[package]
name = "changex-viewer"
version = "0.1.0"
description = "Tauri desktop review app for ChangeX provenance journals"
authors = ["ChangeX"]
edition = "2021"
rust-version = "1.77"

# See https://v2.tauri.app/ for the Tauri v2 docs.

[lib]
name = "changex_viewer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }

[dependencies]
tauri = { version = "2.0.0", features = [] }
tauri-plugin-shell = "2.0.0"
tauri-plugin-dialog = "2.0.0"
tauri-plugin-updater = "2.0.0"
tauri-plugin-process = "2.0.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Native translucent window material: NSVisualEffectView on macOS, Mica/Acrylic on Windows.
window-vibrancy = "0.5"

[features]
# This feature is used for production builds or when a dev server is not specified,
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
