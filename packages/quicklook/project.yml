name: ChangeXQuickLook
options:
  bundleIdPrefix: dev.changex
  deploymentTarget:
    macOS: "12.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.19"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  ChangeXQuickLook:
    type: application
    platform: macOS
    sources: [App]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.changex.ChangeXQuickLook
        INFOPLIST_FILE: App/Info.plist
    dependencies:
      - target: QuickLookExtension
        embed: true
  QuickLookExtension:
    type: app-extension
    platform: macOS
    sources: [Extension]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.changex.ChangeXQuickLook.QuickLookExtension
        INFOPLIST_FILE: Extension/Info.plist
        # Quick Look preview extensions MUST be sandboxed or pkd refuses to load them.
        CODE_SIGN_ENTITLEMENTS: Extension/QuickLookExtension.entitlements
    dependencies:
      - sdk: Quartz.framework
      - sdk: WebKit.framework
