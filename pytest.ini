[pytest]
testpaths = tests
markers =
    libreoffice: external LibreOffice-engine accept/reject oracle (needs soffice; run in CI with `pytest -m libreoffice`)
# The LibreOffice oracle is deselected by default so local runs stay fast and have
# zero skips on platforms where headless LibreOffice can't resolve revisions (macOS).
# CI installs LibreOffice and runs it explicitly with `-m libreoffice`.
addopts = -m "not libreoffice"
